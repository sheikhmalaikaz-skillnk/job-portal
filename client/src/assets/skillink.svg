<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Definitions for Gradients -->
  <defs>
    <!-- Navy Blue Gradient for stability/trust -->
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fa8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Teal Gradient for action/technology -->
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C4CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ee;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 
    The Icon Shape: 
    Two interlocking paths that form an 'S'. 
    Top/Left represents the Candidate (Navy).
    Bottom/Right represents the Opportunity (Teal).
    They link in the middle.
  -->

  <!-- Path 1: Top/Left Link (Navy) -->
  <path d="M85 35 
           C55 35, 35 55, 35 85 
           C35 115, 55 135, 85 135 
           L90 135 
           C80 135, 70 125, 70 110
           L70 85
           C70 65, 60 55, 50 55
           C45 55, 35 65, 35 85" 
        fill="none" 
        stroke="url(#navyGrad)" 
        stroke-width="22" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Path 2: Bottom/Right Link (Teal) -->
  <path d="M115 165 
           C145 165, 165 145, 165 115 
           C165 85, 145 65, 115 65 
           L110 65 
           C120 65, 130 75, 130 90
           L130 115
           C130 135, 140 145, 150 145
           C155 145, 165 135, 165 115" 
        fill="none" 
        stroke="url(#tealGrad)" 
        stroke-width="22" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>